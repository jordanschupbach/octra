name: CI (Linux)

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix-flake-check:
    name: Nix flake check (incl. lint/format)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v9

      - name: Run flake checks
        run: nix flake check -L

  cmake-tests:
    name: CMake + CTest (no Nix)
    runs-on: ubuntu-latest
    env:
      CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ pkg-config

      - name: Cache CPM sources
        uses: actions/cache@v4
        with:
          path: .cpm-cache
          key: cpm-${{ runner.os }}-${{ hashFiles('cmake/CPM.cmake', 'tests/CMakeLists.txt') }}
          restore-keys: |
            cpm-${{ runner.os }}-

      - name: Configure
        run: cmake -S tests -B build/tests -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/tests --config Release

      - name: Test
        run: ctest --test-dir build/tests --output-on-failure
